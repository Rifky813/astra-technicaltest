version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: astra_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rBase!13
      MYSQL_DATABASE: staging
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql_scripts/staging_schema.sql:/docker-entrypoint-initdb.d/01_staging_schema.sql:ro
      - ./sql_scripts/datawarehouse_schema.sql:/docker-entrypoint-initdb.d/02_datawarehouse_schema.sql:ro
      - ./sql_scripts/datamart_schema.sql:/docker-entrypoint-initdb.d/03_datamart_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prBase!13"]
      interval: 10s
      timeout: 5s
      retries: 10

  etl:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app:cached
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: rBase!13
      DB_NAME: staging
      DB_PORT: 3306
    command: ["python", "extract.py"]

volumes:
  mysql_data:
